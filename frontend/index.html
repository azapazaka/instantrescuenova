<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instant Rescue</title>
    <link rel="icon" type="image/png" href="/brand-icon-light.png" data-theme-icon />
    <link rel="apple-touch-icon" href="/brand-icon-light.png" data-theme-icon />
    <script>
      (function () {
        try {
          var saved = window.localStorage.getItem("instant-rescue-theme");
          var theme = saved === "light" || saved === "dark"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
          document.querySelectorAll("[data-theme-icon]").forEach(function (link) {
            link.href = theme === "dark" ? "/brand-icon-dark.png" : "/brand-icon-light.png";
          });
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main id="app-boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f7f2;color:#172126;text-align:center">
        <div>
          <strong style="display:block;font-size:24px;margin-bottom:10px">Instant Rescue</strong>
          <span>Загружаем приложение...</span>
        </div>
      </main>
    </div>
    <script>
      window.addEventListener("error", function () {
        var fallback = document.getElementById("app-boot-fallback");
        if (fallback) {
          fallback.innerHTML = "<div><strong style=\"display:block;font-size:24px;margin-bottom:10px\">Instant Rescue</strong><span>Не удалось открыть приложение. Обновите страницу или очистите кеш браузера.</span></div>";
        }
      });
      window.addEventListener("unhandledrejection", function () {
        var fallback = document.getElementById("app-boot-fallback");
        if (fallback) {
          fallback.innerHTML = "<div><strong style=\"display:block;font-size:24px;margin-bottom:10px\">Instant Rescue</strong><span>Не удалось открыть приложение. Обновите страницу или очистите кеш браузера.</span></div>";
        }
      });
    </script>
    <script nomodule>
      var fallback = document.getElementById("app-boot-fallback");
      if (fallback) {
        fallback.innerHTML = "<div><strong style=\"display:block;font-size:24px;margin-bottom:10px\">Instant Rescue</strong><span>Ваш браузер слишком старый. Обновите Safari/Chrome или откройте ссылку в другом браузере.</span></div>";
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
